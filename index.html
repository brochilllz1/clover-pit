<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/clover-pit@main/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | CloverPit</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="loading-text"
    style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;"> LOADING...
  </div>
    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=540 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
  var loadingText = document.querySelector("#loading-text");
  let loadedBytes = 0;

  async function fetchWithProgress(url) {
    const response = await fetch(url);
    const reader = response.body.getReader();
    let chunks = [];
    let received = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      received += value.length;
      loadedBytes += value.length;
      chunks.push(value);
      let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
      loadingText.textContent = `LOADING... ${mbDone} MB / 86.96 MB`;
    }
    let fullBuffer = new Uint8Array(received);
    let offset = 0;
    for (let chunk of chunks) {
      fullBuffer.set(chunk, offset);
      offset += chunk.length;
    }
    return fullBuffer.buffer;
  }

  async function mergeFiles(fileParts) {
    const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
    const mergedBlob = new Blob(buffers);
    return URL.createObjectURL(mergedBlob);
  }

  function getParts(file, start, end) {
    let parts = [];
    for (let i = start; i <= end; i++) {
      parts.push(file + ".part" + i);
    }
    return parts;
  }

  (async () => {
    const [dataUrl, wasmUrl] = await Promise.all([
      mergeFiles(getParts("Build/CloverPit.data", 1, 3)),
      mergeFiles(getParts("Build/CloverPit.wasm", 1, 3)),
    ]);

    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");

    function unityShowBanner(msg, type) {}

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/CloverPit.loader.js";
    var config = {
      arguments: [],
      dataUrl: dataUrl,
      frameworkUrl: buildUrl + "/CloverPit.framework.js",
      codeUrl: wasmUrl,
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Panik Arcade",
      productName: "CloverPit",
      productVersion: "1.3",
      showBanner: unityShowBanner,
      autoSyncPersistentDataPath: true,
    };

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
      }).catch((message) => {
        console.error(message);
      });
    };
    document.body.appendChild(script); // ← moved inside the async function
  })(); // ← added () to actually call it
</script>
  </body>
</html>
