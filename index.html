<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/clover-pit@main/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | CloverPit</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      .savebtn {
        position: fixed;
        top: 12px;
        right: 12px;
        padding: 10px 18px;
        cursor: pointer;
        background: rgba(50, 50, 50, 0.85);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        font: 14px Arial;
        z-index: 9999;
        transition: 0.3s;
      }
      .savebtn:hover { background: rgba(70, 70, 70, 0.95); }
    </style>
  </head>
  <body>
    <div id="loading-text"
      style="color:white;font-size:48px;font-family:cursive;text-align:center;margin-top:20px;">
      LOADING...
    </div>
    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=540 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>

    <script>
    // ── IDBFS timestamp patch ─────────────────────────────────────────────────
    // CloverPit.framework.js stores timestamps as plain numbers in IDB (via the
    // "timestamp" index key), but its reconcile() function calls .getTime() on
    // them expecting Date objects. This crashes the sync loop and prevents saves
    // from ever being written to IDB.
    //
    // Fix: wrap IDBIndex.prototype.openKeyCursor so every cursor key that is a
    // number gets promoted to a Date before it reaches reconcile().
    (function () {
      var _openKeyCursor = IDBIndex.prototype.openKeyCursor;
      IDBIndex.prototype.openKeyCursor = function () {
        var req = _openKeyCursor.apply(this, arguments);
        var _addEventListener = req.addEventListener.bind(req);
        // Patch the onsuccess setter so we can intercept cursor results
        var _onsuccess = null;
        Object.defineProperty(req, 'onsuccess', {
          get: function () { return _onsuccess; },
          set: function (fn) {
            _onsuccess = function (event) {
              var cursor = event.target.result;
              if (cursor && typeof cursor.key === 'number') {
                // Promote numeric timestamp to Date so .getTime() works
                try {
                  Object.defineProperty(cursor, 'key', {
                    value: new Date(cursor.key),
                    configurable: true
                  });
                } catch (e) { /* already a Date or non-configurable, skip */ }
              }
              fn.call(this, event);
            };
          }
        });
        return req;
      };
    })();
    // ─────────────────────────────────────────────────────────────────────────

    var loadingText = document.querySelector("#loading-text");
    let loadedBytes = 0;

    async function fetchWithProgress(url) {
      const response = await fetch(url);
      const reader = response.body.getReader();
      let chunks = [], received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        received    += value.length;
        loadedBytes += value.length;
        chunks.push(value);
        loadingText.textContent =
          `LOADING... ${(loadedBytes / 1048576).toFixed(2)} MB / 86.96 MB`;
      }
      const buf = new Uint8Array(received);
      let offset = 0;
      for (const chunk of chunks) { buf.set(chunk, offset); offset += chunk.length; }
      return buf.buffer;
    }

    async function mergeFiles(parts) {
      const buffers = await Promise.all(parts.map(fetchWithProgress));
      return URL.createObjectURL(new Blob(buffers));
    }

    function getParts(file, start, end) {
      const parts = [];
      for (let i = start; i <= end; i++) parts.push(`${file}.part${i}`);
      return parts;
    }

    // ── Save download helpers (ported from Hollow Knight port) ────────────────
    function odb(n) {
      return new Promise((ok, bd) => {
        const r = indexedDB.open(n);
        r.onsuccess = () => ok(r.result);
        r.onerror   = () => bd(r.error);
      });
    }

    function ga(d, s) {
      return new Promise((ok, bd) => {
        const t  = d.transaction([s], 'readonly');
        const st = t.objectStore(s);
        const r  = st.getAll();
        r.onsuccess = () => ok(r.result);
        r.onerror   = () => bd(r.error);
      });
    }

    async function sdl() {
      try {
        const dbs = await indexedDB.databases();
        let sv = {}, fd = false;
        for (const inf of dbs) {
          const db = await odb(inf.name);
          for (const st of db.objectStoreNames) {
            try {
              const dt = await ga(db, st);
              if (dt && dt.length > 0) {
                const fx = dt.map(it => {
                  if (it.contents && it.contents instanceof Uint8Array)
                    return { ...it, contents: Array.from(it.contents) };
                  return it;
                });
                sv[`${inf.name}/${st}`] = fx;
                fd = true;
              }
            } catch (e) { /* skip unreadable stores */ }
          }
          db.close();
        }
        if (!fd) { alert('No save found'); return; }
        const js = JSON.stringify(sv);
        const bl = new Blob([js], { type: 'application/octet-stream' });
        const u  = URL.createObjectURL(bl);
        const a  = document.createElement('a');
        a.href = u; a.download = 'cloverpit_save.dat';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(u);
      } catch (e) { alert('Download failed: ' + e.message); }
    }

    function asb() {
      const btn     = document.createElement('button');
      btn.className = 'savebtn';
      btn.textContent = 'download save';
      btn.onclick   = sdl;
      document.body.appendChild(btn);
    }
    // ─────────────────────────────────────────────────────────────────────────

    (async () => {
      const [dataUrl, wasmUrl] = await Promise.all([
        mergeFiles(getParts("Build/CloverPit.data", 1, 3)),
        mergeFiles(getParts("Build/CloverPit.wasm", 1, 3)),
      ]);

      const canvas          = document.querySelector("#unity-canvas");
      const loadingBar      = document.querySelector("#unity-loading-bar");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");

      const config = {
        arguments:          [],
        dataUrl:            dataUrl,
        frameworkUrl:       "Build/CloverPit.framework.js",
        codeUrl:            wasmUrl,
        streamingAssetsUrl: "StreamingAssets",
        companyName:        "Panik Arcade",
        productName:        "CloverPit",
        productVersion:     "1.3",
        showBanner:         function () {},
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const meta = document.createElement('meta');
        meta.name    = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.head.appendChild(meta);
      }

      loadingBar.style.display = "block";

      const script  = document.createElement("script");
      script.src    = "Build/CloverPit.loader.js";
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then(() => {
          loadingBar.style.display  = "none";
          loadingText.style.display = "none";
          asb(); // show the download save button
        }).catch(() => {});
      };
      document.body.appendChild(script);
    })();
    </script>
  </body>
</html>
